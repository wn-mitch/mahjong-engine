name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the OIDC/Pages scopes deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10 # matches local pnpm; lockfileVersion 9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check # gate: typecheck (svelte-check)
      - run: pnpm test # gate: vitest
      - run: pnpm build
        env:
          BASE_PATH: /mahjong-engine
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build # adapter-static default output dir

  deploy:
    # Only deploys if `build` (install + check + test + build) succeeded.
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
